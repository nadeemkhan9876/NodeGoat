name: Trivy control

on:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (sarif)
        uses: aquasecurity/trivy-action@v0.35.0 # Upgraded to a known secure, post-incident tag
        with:
          scan-type: 'fs'
          format: 'sarif'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '0'
          output: 'trivy-results.sarif'

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v4 # Upgraded to v4 to eliminate the deprecation warning
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy (console output)
        uses: aquasecurity/trivy-action@v0.35.0 # Upgraded to a known secure, post-incident tag
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1' # This intentional gate will give a Red X if real vulnerabilities exist
